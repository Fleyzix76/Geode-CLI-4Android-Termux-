name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Enable tmate debug session on failure"
        required: false
        default: false
        type: boolean
  push:
    paths:
      - "src/**"
      - "Cargo.toml"
      - "build.rs"
      - ".github/workflows/build.yml"
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "Android"
            id: android64
            os: ubuntu-latest
            executable: "geode"
            target: "aarch64-linux-android"
            prebuild: "cargo build --target aarch64-linux-android --release" 
            
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.config.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.config.id }}

      - name: Pre-build steps (if any)
        if: ${{ matrix.config.prebuild != '' }}
        run: |
          ${{ matrix.config.prebuild }}

      - name: Build Binary
        run: |
          cargo build --release --target ${{ matrix.config.target }}

      - name: Prepare Output Folder
        run: |
          mkdir -p ./out
          mv ./target/${{ matrix.config.target }}/release/${{ matrix.config.executable }} ./out/ || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: geode-cli-${{ matrix.config.id }}
          path: ./out/

      - name: Setup tmate session on Failure
        if: ${{ failure() && github.event.inputs.debug == 'true' && matrix.config.id == 'mac' }}
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && always()
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Declare Version Variables
        id: ref
        run: |
          if [ -f "VERSION" ]; then
            echo "version=$(cat VERSION | xargs)" >> $GITHUB_OUTPUT
          else
            echo "version=unknown" >> $GITHUB_OUTPUT
          fi
          echo "hash=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_OUTPUT

      - name: Download Artifacts from Build Jobs
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Zip Android Artifacts
        run: |
          mkdir -p artifacts/zipped
          find artifacts -name "geode" -exec zip artifacts/zipped/geode-cli-${{ steps.ref.outputs.hash }}-android64.zip {} \;
          
      - name: Show created zip
        run: ls -lh artifacts/zipped/

