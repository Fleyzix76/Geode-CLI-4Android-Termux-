name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      debug:
        description: enable tmate debug
        default: false
        type: boolean
  push:
    paths:
    - "src/**"
    - "Cargo.toml"
    - "build.rs"
    - ".github/workflows/build.yml"
    branches: [ main ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: "Android"
          id: android64
          os: ubuntu-latest
          executable: 'geode'
          prebuild: |
            pkg install rust
            cargo build --target aarch64-linux-android --release
          target: aarch64-linux-android

name: Build ${{ matrix.config.name }}
runs-on: {{ matrix.config.os }}
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ matrix.config.target }}

    - uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.config.id }}

    - name: Build
      run: |
        ${{ matrix.config.prebuild }}
        cargo build --release --target ${{ matrix.config.target }}

    - name: Move to output folder
      shell: bash
      run: |
        mkdir ./out
        mv ./target/${{ matrix.config.target }}/release/${{ matrix.config.executable }} ./out

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: geode-cli-${{ matrix.config.id }}
        path: ./out/

    - name: Setup tmate session
      if: ${{ failure() && inputs.debug && matrix.config.id == 'mac' }}
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Declare Version Variables
      id: ref
      run: |
        echo "version=$(cat VERSION | xargs)" >> $GITHUB_OUTPUT
        echo "hash=$(git rev-parse --short "$GITHUB_SHA")" >> $GITHUB_OUTPUT

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: ${{ github.workspace }}/artifacts

    - name: Zip Android Artifacts
      uses: vimtor/action-zip@v1.2
      with:
        files: artifacts/geode-cli-android64/geode
        dest: artifacts/geode-cli-${{ steps.ref.outputs.hash }}-android64.zip
